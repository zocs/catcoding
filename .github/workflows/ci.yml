name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-
    
    - name: Build
      run: cargo build --release --verbose
      
    - name: Run tests
      run: cargo test --verbose
      
    - name: Clippy
      run: cargo clippy -- -D warnings
      
    - name: Format check
      run: cargo fmt -- --check

  dashboard:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
        cache-dependency-path: dashboard/package-lock.json
        
    - name: Install dependencies
      working-directory: dashboard
      run: npm ci
      
    - name: Build Dashboard
      working-directory: dashboard
      run: npm run build
      
    - name: Upload Dashboard artifact
      uses: actions/upload-artifact@v4
      with:
        name: dashboard-dist
        path: dashboard/dist/

  release:
    needs: [build, dashboard]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Build release
      run: cargo build --release
      
    - name: Download Dashboard artifact
      uses: actions/download-artifact@v4
      with:
        name: dashboard-dist
        path: dashboard/dist/
      
    - name: Package
      run: |
        mkdir -p catcoding-${{ github.ref_name }}
        cp target/release/catcoding-daemon catcoding-${{ github.ref_name }}/
        cp target/release/catcoding catcoding-${{ github.ref_name }}/
        cp -r dashboard/dist catcoding-${{ github.ref_name }}/dashboard/
        cp README.md catcoding-${{ github.ref_name }}/
        cp LICENSE catcoding-${{ github.ref_name }}/
        cp config/agent.yaml.example catcoding-${{ github.ref_name }}/
        tar czf catcoding-${{ github.ref_name }}-linux-amd64.tar.gz catcoding-${{ github.ref_name }}/
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          catcoding-${{ github.ref_name }}-linux-amd64.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
