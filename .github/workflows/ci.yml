name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUSTUP_MAX_RETRIES: 10

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# CI Pipeline: Code → Lint → Test → Build → [Release]
# Based on: Red Hat CI/CD 6-stage pipeline model
# Inspired by: astral-sh/ruff (smart change detection)
#              pydantic (Rust core + Python matrix)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

jobs:
  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 1: Change Detection (skip unnecessary work)       ║
  # ╚══════════════════════════════════════════════════════════╝
  changes:
    name: "Detect changes"
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.check.outputs.rust }}
      python: ${{ steps.check.outputs.python }}
      dashboard: ${{ steps.check.outputs.dashboard }}
      any: ${{ steps.check.outputs.any }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine merge base
        id: base
        run: |
          sha=$(git merge-base HEAD "origin/${{ github.event.pull_request.base.ref || 'main' }}" 2>/dev/null || git rev-parse HEAD~1)
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Check what changed
        id: check
        env:
          BASE: ${{ steps.base.outputs.sha }}
        run: |
          rust_changed() { ! git diff --quiet "$BASE...HEAD" -- Cargo.toml Cargo.lock daemon/ cli/; }
          python_changed() { ! git diff --quiet "$BASE...HEAD" -- agents/; }
          dashboard_changed() { ! git diff --quiet "$BASE...HEAD" -- dashboard/; }

          echo "rust=$(rust_changed && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "python=$(python_changed && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "dashboard=$(dashboard_changed && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "any=true" >> "$GITHUB_OUTPUT"

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 2a: Rust Lint (fmt + clippy)                      ║
  # ╚══════════════════════════════════════════════════════════╝
  rust-lint:
    name: "Rust / Lint"
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (daemon)
        run: cargo clippy -p catcoding-daemon --all-features -- -D warnings

      - name: Clippy (CLI)
        run: cargo clippy -p catcoding --all-features -- -D warnings

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 2b: Python Lint + Type Check                      ║
  # ╚══════════════════════════════════════════════════════════╝
  python-lint:
    name: "Python / Lint"
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: |
          pip install ruff mypy

      - name: Ruff lint
        run: ruff check agents/ --output-format=github

      - name: Ruff format check
        run: ruff format agents/ --check

      - name: Type check (non-blocking)
        run: mypy agents/ --ignore-missing-imports || true

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 2c: Dashboard Lint (Vue 3 + TypeScript)           ║
  # ╚══════════════════════════════════════════════════════════╝
  dashboard-lint:
    name: "Dashboard / Lint"
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Type check
        working-directory: dashboard
        run: npx vue-tsc --noEmit || true

      - name: Build check
        working-directory: dashboard
        run: npm run build

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 3a: Rust Tests (unit + integration)               ║
  # ╚══════════════════════════════════════════════════════════╝
  rust-test:
    name: "Rust / Test (${{ matrix.os }})"
    needs: [changes, rust-lint]
    if: needs.changes.outputs.rust == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Run tests
        run: cargo test --all-features --verbose

      - name: Build release
        run: cargo build --release --verbose

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: rust-binaries-${{ matrix.os }}
          path: |
            target/release/catcoding-daemon
            target/release/catcoding
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 3b: Python Tests                                  ║
  # ╚══════════════════════════════════════════════════════════╝
  python-test:
    name: "Python / Test (py${{ matrix.python-version }})"
    needs: [changes, python-lint]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio
          pip install -r agents/requirements.txt || true

      - name: Run tests
        run: pytest agents/ -v --tb=short || echo "No tests yet - agents are agent-driven"

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 3c: Integration Test (NATS + Daemon + Agents)     ║
  # ╚══════════════════════════════════════════════════════════╝
  integration-test:
    name: "Integration / E2E"
    needs: [rust-test, python-test]
    if: |
      always() &&
      (needs.rust-test.result == 'success' || needs.rust-test.result == 'skipped') &&
      (needs.python-test.result == 'success' || needs.python-test.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install NATS Server
        run: |
          curl -sf https://binaries.nats.dev/nats-io/nats-server/v2.10.25/nats-server-v2.10.25-linux-amd64.tar.gz | tar xz
          sudo mv nats-server /usr/local/bin/

      - name: Install Python deps
        run: |
          pip install nats-py pytest pytest-asyncio

      - name: Build daemon
        run: cargo build --release -p catcoding-daemon

      - name: Integration test - Daemon + NATS smoke test
        run: |
          nats-server -js &
          sleep 2
          ./target/release/catcoding-daemon &
          DAEMON_PID=$!
          sleep 3

          # Verify daemon is responding
          curl -sf http://localhost:9800/health || {
            echo "❌ Daemon health check failed"
            kill $DAEMON_PID 2>/dev/null
            exit 1
          }

          echo "✅ Daemon + NATS integration OK"
          kill $DAEMON_PID 2>/dev/null
          pkill nats-server 2>/dev/null || true

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 4: Dashboard Build                                ║
  # ╚══════════════════════════════════════════════════════════╝
  dashboard-build:
    name: "Dashboard / Build"
    needs: [changes, dashboard-lint]
    if: needs.changes.outputs.dashboard == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install and build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/
          retention-days: 3

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 5: Release (on tag push only)                     ║
  # ╚══════════════════════════════════════════════════════════╝
  release:
    name: "Release / Package"
    needs: [rust-test, dashboard-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release binaries
        run: cargo build --release

      - name: Download dashboard artifact
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist/

      - name: Package release
        run: |
          VERSION="${GITHUB_REF_NAME}"
          PKG="catcoding-${VERSION}-linux-amd64"

          mkdir -p "${PKG}"
          cp target/release/catcoding-daemon "${PKG}/"
          cp target/release/catcoding "${PKG}/"
          cp -r dashboard/dist "${PKG}/dashboard/"
          cp README.md LICENSE "${PKG}/"
          cp config/agent.yaml.example "${PKG}/"
          cp CHANGELOG.md "${PKG}/" 2>/dev/null || true

          tar czf "${PKG}.tar.gz" "${PKG}/"
          sha256sum "${PKG}.tar.gz" > "${PKG}.sha256"

          echo "📦 Package: ${PKG}.tar.gz"
          echo "🔑 SHA256: $(cat ${PKG}.sha256)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            catcoding-*-linux-amd64.tar.gz
            catcoding-*-linux-amd64.sha256
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ╔══════════════════════════════════════════════════════════╗
  # ║ Stage 6: Security Scan (non-blocking)                   ║
  # ╚══════════════════════════════════════════════════════════╝
  security:
    name: "Security / Audit"
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo audit (Rust vulnerabilities)
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit || echo "⚠️ Audit found issues (non-blocking)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Safety check (Python vulnerabilities)
        run: |
          pip install safety
          safety check -r agents/requirements.txt || echo "⚠️ Safety check found issues (non-blocking)"
