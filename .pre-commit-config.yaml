# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Pre-commit hooks — install: pip install pre-commit && pre-commit install
# Catches issues before push, saves CI time
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
repos:
  # ── General ──────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict

  # ── Rust ─────────────────────────────────────────────────
  - repo: https://github.com/doublify/pre-commit-rust
    rev: v1.0
    hooks:
      - id: fmt
        name: "Rust: cargo fmt"
        args: ['--all', '--', '--check']
      - id: clippy
        name: "Rust: cargo clippy"
        args: ['--', '-D', 'warnings']

  # ── Python ───────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        name: "Python: ruff lint"
        args: ['--fix']
      - id: ruff-format
        name: "Python: ruff format"

  # ── Vue/TypeScript ───────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: "Vue/TS: prettier"
        types_or: [vue, ts, js, json, css]
        files: '^dashboard/'
